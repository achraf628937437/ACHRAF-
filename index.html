<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>استطلاع</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #f4f4f4;
  padding-top: 50px;
}

h1 { font-size: 24px; }

button {
  display: block;
  margin: 10px auto;
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

#result {
  display: none;
  margin-top: 20px;
}

#result img {
  width: 200px;
  border-radius: 15px;
  margin-top: 10px;
}

#text {
  font-size: 20px;
  margin-top: 10px;
}

#boom {
  display: none;
  font-size: 100px;
  margin-top: 30px;
}

#finalText {
  display: none;
  font-size: 60px;
  font-weight: bold;
  color: #ff0033;
  text-shadow: 0 0 20px red, 0 0 40px orange;
}
</style>

</head>

<body>

<h1>أستاذ لي ما كتحملش؟ 😏</h1>

<button onclick="showResult('math')">أستاذ الماط</button>
<button onclick="showResult('fr')">أستاذ فرونسي</button>
<button onclick="showResult('social')">أستاذ الاجتماعيات</button>
<button onclick="showResult('eng')">أستاذ لونكلي</button>

<div id="result">
  <img id="img">
  <div id="text"></div>
</div>

<div id="boom">💥</div>
<div id="finalText">1BAC-SHF_4 😈</div>

<script>
function showResult(type) {

  let img = "";
  let text = "";

  if (type == "math") {
    img = "math.jpg";
    text = "😂 أستاذ الماط: لكراش ديال أسامة ههه";
  }

  else if (type == "fr") {
    img = "francais.jpg";
    text = "😂 أستاذ فرونسي: الجدة كراني ههه";
  }

  else if (type == "social") {
    img = "social.jpg";
    text = "😂 أستاذ الاجتماعيات: بلفاع العاصمة… إغتيال… واي عهد النمسة";
  }

  else if (type == "eng") {
    img = "english.jpg";
    text = "😂 أستاذ لونكلي: ازدواز غادي دوز";
  }

  document.getElementById("img").src = img;
  document.getElementById("text").innerText = text;
  document.getElementById("result").style.display = "block";

  document.querySelectorAll("button").forEach(btn => btn.style.display = "none");

  setTimeout(() => {
    document.getElementById("result").style.display = "none";
    document.getElementById("boom").style.display = "block";
  }, 2500);

  setTimeout(() => {
    document.getElementById("boom").style.display = "none";
    document.getElementById("finalText").style.display = "block";
  }, 3500);
}
</script>

</body>
</html>
