<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Love Game 💖</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #ffe6f0;
    height: 100vh;
    overflow: hidden;
  }

  h1 {
    color: #ff0066;
    margin-top: 80px;
  }

  button {
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 40px;
    margin: 10px;
    cursor: pointer;
    position: absolute;
    transition: 0.3s;
  }

  #yes {
    background: #00cc66;
    color: white;
    left: 40%;
    top: 50%;
  }

  #no {
    background: #ff3333;
    color: white;
    left: 55%;
    top: 50%;
  }

  .heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 3s linear infinite;
  }

  @keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-300px); opacity: 0; }
  }

  .message {
    font-size: 40px;
    color: #ff0066;
    display: none;
    margin-top: 50px;
  }
</style>

</head>
<body>

<h1 id="question">واش كتحبني؟ 😏</h1>

<button id="yes" onclick="yesClick()">نعم 💖</button>
<button id="no" onmouseover="moveNo()">لا 😢</button>

<div class="message" id="msg">Yaaay! 🥰💖 3refti!</div>

<script>
let questions = [
  "واش بصح؟ 😍",
  "متأكد؟ 🤨",
  "آخر فرصة! 😏",
  "قول الحقيقة 😂",
  "راه غادي نبكي 😭"
];

let index = 0;
let yesSize = 20;

function yesClick() {
  yesSize += 5;
  document.getElementById("yes").style.fontSize = yesSize + "px";

  index++;
  if (index >= questions.length) {
    showLove();
  } else {
    document.getElementById("question").innerText = questions[index];
  }
}

function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 100);

  let noBtn = document.getElementById("no");
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function showLove() {
  document.getElementById("msg").style.display = "block";

  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}
</script>

</body>
</html>
